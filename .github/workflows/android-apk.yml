# ─────────────────────────────────────────────────────────────────────────
# Build the Pushkaralu Android APK on every push to mobile-app/.
#
# Output: a downloadable .apk artifact attached to the workflow run.
#         If a release tag is pushed (v*), an .aab is also produced for
#         Play Store upload.
#
# Why GitHub Actions: the sandbox where this app is developed has no
# Android SDK; CI is the canonical place to assemble the binary.
# ─────────────────────────────────────────────────────────────────────────
name: Android APK

on:
  push:
    branches: ['**']
    paths:
      - 'pushkaralu_fixed/mobile-app/**'
      - 'pushkaralu_fixed/dashboards/**'
      - '.github/workflows/android-apk.yml'
  pull_request:
    paths:
      - 'pushkaralu_fixed/mobile-app/**'
      - 'pushkaralu_fixed/dashboards/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

permissions:
  contents: read

jobs:
  build:
    name: Assemble APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: pushkaralu_fixed/mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('pushkaralu_fixed/mobile-app/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Generate icon + splash PNGs
        run: npm run icons:generate

      - name: Sync website into www/
        run: npm run sync:web

      - name: Add Android platform
        run: npx cap add android

      - name: Apply Android overrides (permissions, deep links, theme)
        run: npm run android:overrides

      - name: Generate Android assets (mipmaps, splash)
        run: npx capacitor-assets generate --android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: pushkaralu_fixed/mobile-app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK + AAB
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        working-directory: pushkaralu_fixed/mobile-app/android
        env:
          PUSHKARA_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PUSHKARA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          PUSHKARA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          PUSHKARA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          # If release secrets are not configured we still produce an
          # unsigned release APK, then sign it as debug for installability.
          if [ -n "$PUSHKARA_KEYSTORE_BASE64" ]; then
            echo "$PUSHKARA_KEYSTORE_BASE64" | base64 -d > release.keystore
            cat <<GRADLE >> app/build.gradle

          android {
            signingConfigs {
              release {
                storeFile file('../release.keystore')
                storePassword System.getenv('PUSHKARA_KEYSTORE_PASSWORD')
                keyAlias     System.getenv('PUSHKARA_KEY_ALIAS')
                keyPassword  System.getenv('PUSHKARA_KEY_PASSWORD')
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          GRADLE
          fi
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Locate APK / AAB
        id: locate
        run: |
          mkdir -p ../../artifacts
          find android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -print -exec cp {} ../../artifacts/ \;
          ls -la ../../artifacts || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pushkaralu-apk-${{ github.run_number }}
          path: artifacts/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: pushkaralu-aab-${{ github.run_number }}
          path: artifacts/*.aab
          if-no-files-found: ignore
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "### Pushkaralu APK build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artefacts produced:" >> $GITHUB_STEP_SUMMARY
          ls -lh ../../artifacts 2>/dev/null | awk '{print "* `" $NF "` (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "_no artefacts_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above to install on your phone." >> $GITHUB_STEP_SUMMARY
