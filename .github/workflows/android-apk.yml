# ─────────────────────────────────────────────────────────────────────────
# Build the Pushkaralu Android APK on every push to mobile-app/.
#
# Output: a downloadable .apk artifact attached to the workflow run.
#         If a release tag is pushed (v*), an .aab is also produced for
#         Play Store upload.
#
# Hardening (third pass — root cause confirmed from CI logs):
#   - Add `typescript` devDep — `npx cap add android` failed with
#     "Could not find installation of TypeScript" because our config
#     is `capacitor.config.ts`. Capacitor 6 requires TS to load it.
#   - Replace `sharp` with `rsvg-convert` (apt librsvg2-bin) — sharp's
#     prebuilt-binary install is the most common cause of fast-fail
#     npm-installs on ubuntu-latest.
#   - JDK 17, not 21. Capacitor 6 + AGP 8.x officially target 17.
#   - `set -euxo pipefail` in every multi-line `run:` so the failing
#     command is always visible with a line number.
#   - Pre-flight Doctor step prints env + network reachability up front.
# ─────────────────────────────────────────────────────────────────────────
name: Android APK

on:
  push:
    branches: ['**']
    paths:
      - 'pushkaralu_fixed/mobile-app/**'
      - 'pushkaralu_fixed/dashboards/**'
      - '.github/workflows/android-apk.yml'
  pull_request:
    paths:
      - 'pushkaralu_fixed/mobile-app/**'
      - 'pushkaralu_fixed/dashboards/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

permissions:
  contents: read

jobs:
  build:
    name: Assemble APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: pushkaralu_fixed/mobile-app
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Doctor — pre-flight environment check
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          echo "::group::Runner OS"
          uname -a
          cat /etc/os-release || true
          echo "::endgroup::"
          echo "::group::Disk + memory"
          df -h .
          free -h || true
          echo "::endgroup::"
          echo "::group::Tooling preinstalled"
          which bash node npm java javac git curl unzip || true
          echo "::endgroup::"
          echo "::group::Network reachability"
          curl -fsS -o /dev/null -w "registry.npmjs.org -> %{http_code}\n" https://registry.npmjs.org/ || true
          curl -fsS -o /dev/null -w "dl.google.com -> %{http_code}\n"      https://dl.google.com/ || true
          curl -fsS -o /dev/null -w "services.gradle.org -> %{http_code}\n" https://services.gradle.org/ || true
          echo "::endgroup::"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install librsvg2-bin (for SVG → PNG icon rasterisation)
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          rsvg-convert --version

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Verify Android SDK installation
        run: |
          set -euxo pipefail
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_HOME" || true
          ls -la "$ANDROID_HOME/platforms" || true
          ls -la "$ANDROID_HOME/build-tools" || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('pushkaralu_fixed/mobile-app/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install npm deps
        run: |
          set -euxo pipefail
          node --version
          npm  --version
          npm install --no-audit --no-fund --legacy-peer-deps --foreground-scripts --loglevel=info
          echo "--- top-level deps after install ---"
          npm ls --depth=0 || true
          echo "--- key Capacitor / TS versions ---"
          npm ls @capacitor/core @capacitor/android @capacitor/cli @capacitor/assets typescript || true

      - name: Generate icon + splash PNGs
        run: |
          set -euxo pipefail
          npm run icons:generate
          ls -la resources/

      - name: Sync website into www/
        run: |
          set -euxo pipefail
          npm run sync:web
          echo "--- www/ contents ---"
          ls -la www/

      - name: Add Android platform
        run: |
          set -euxo pipefail
          npx cap add android
          echo "--- android/ tree (top 2 levels) ---"
          find android -maxdepth 2 -type d | sort

      - name: Apply Android overrides (permissions, deep links, theme)
        run: |
          set -euxo pipefail
          npm run android:overrides

      - name: Generate Android assets (mipmaps, splash)
        run: |
          set -euxo pipefail
          npx capacitor-assets generate --android --verbose

      - name: Capacitor sync
        run: |
          set -euxo pipefail
          npx cap sync android

      - name: Diagnostic dump on failure
        if: failure()
        working-directory: pushkaralu_fixed/mobile-app
        run: |
          set +e
          echo "::group::resources/"
          ls -la resources/ || true
          echo "::endgroup::"
          echo "::group::www/"
          ls -la www/ || true
          echo "::endgroup::"
          echo "::group::android/app/src/main/AndroidManifest.xml"
          cat android/app/src/main/AndroidManifest.xml || echo "(no manifest)"
          echo "::endgroup::"
          echo "::group::android/app/build.gradle"
          cat android/app/build.gradle || echo "(no app/build.gradle)"
          echo "::endgroup::"
          echo "::group::npm ls (top-level)"
          npm ls --depth=0 || true
          echo "::endgroup::"
          echo "::group::node_modules/.bin"
          ls node_modules/.bin 2>/dev/null | head -40 || true
          echo "::endgroup::"

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: pushkaralu_fixed/mobile-app/android
        run: |
          set -euxo pipefail
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK + AAB
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        working-directory: pushkaralu_fixed/mobile-app/android
        env:
          PUSHKARA_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PUSHKARA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          PUSHKARA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          PUSHKARA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          chmod +x ./gradlew
          if [ -n "$PUSHKARA_KEYSTORE_BASE64" ]; then
            echo "$PUSHKARA_KEYSTORE_BASE64" | base64 -d > release.keystore
            cat <<'GRADLE' >> app/build.gradle

          android {
            signingConfigs {
              release {
                storeFile file('../release.keystore')
                storePassword System.getenv('PUSHKARA_KEYSTORE_PASSWORD')
                keyAlias     System.getenv('PUSHKARA_KEY_ALIAS')
                keyPassword  System.getenv('PUSHKARA_KEY_PASSWORD')
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          GRADLE
          fi
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Locate APK / AAB
        id: locate
        run: |
          set -euxo pipefail
          mkdir -p ../../artifacts
          find android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -print -exec cp {} ../../artifacts/ \;
          ls -la ../../artifacts || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pushkaralu-apk-${{ github.run_number }}
          path: artifacts/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: pushkaralu-aab-${{ github.run_number }}
          path: artifacts/*.aab
          if-no-files-found: ignore
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          set +e
          echo "### Pushkaralu APK build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artefacts produced:" >> $GITHUB_STEP_SUMMARY
          ls -lh ../../artifacts 2>/dev/null | awk '{print "* `" $NF "` (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "_no artefacts_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above to install on your phone." >> $GITHUB_STEP_SUMMARY
