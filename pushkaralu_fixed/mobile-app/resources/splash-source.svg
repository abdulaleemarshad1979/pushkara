<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0B2E6E"/>
      <stop offset="100%" stop-color="#08204D"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F0A830"/>
      <stop offset="100%" stop-color="#E8600A"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed navy background -->
  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- Centred logo group: roughly icon-source.svg scaled 2x and centred -->
  <g transform="translate(854,854)">
    <rect width="1024" height="1024" rx="172" fill="url(#bg)" stroke="#1F5BC6" stroke-opacity="0.4" stroke-width="6"/>
    <circle cx="512" cy="416" r="200" fill="url(#wave)"/>
    <path d="M80 696 q112 -84 224 0 t224 0 t224 0 t224 0 V856 H80 Z" fill="#1F5BC6" opacity="0.55"/>
    <path d="M80 760 q112 -76 224 0 t224 0 t224 0 t224 0 V920 H80 Z" fill="#0B2E6E"/>
    <text x="512" y="512" font-family="Georgia, serif" font-size="296" font-weight="700"
          text-anchor="middle" fill="#FFFFFF" dominant-baseline="middle">P</text>
  </g>

  <!-- Wordmark -->
  <text x="1366" y="2050" font-family="'DM Sans', system-ui, sans-serif" font-size="120" font-weight="700"
        text-anchor="middle" fill="#FFFFFF" letter-spacing="14">PUSHKARALU</text>
  <text x="1366" y="2160" font-family="'DM Sans', system-ui, sans-serif" font-size="56" font-weight="500"
        text-anchor="middle" fill="#F0A830" letter-spacing="6">PILGRIM PORTAL · 2027</text>

  <!-- Subtle wave ornament along bottom edge -->
  <path d="M0 2480 q341 -80 683 0 t683 0 t683 0 t683 0 V2732 H0 Z" fill="#0B2E6E" opacity="0.85"/>
  <path d="M0 2560 q341 -60 683 0 t683 0 t683 0 t683 0 V2732 H0 Z" fill="#08204D"/>
</svg>
