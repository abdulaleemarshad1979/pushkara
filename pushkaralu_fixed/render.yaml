# ── Godavari Pushkaralu 2027 — Render.com Deployment  (v5)
# Deploy with: https://dashboard.render.com/select-repo

services:
  - type: web
    name: pushkaralu-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: ENABLE_REDIS
        value: "true"
      - key: REDIS_URL
        fromService:
          name: pushkaralu-redis
          type: redis
          property: connectionString
      - key: CROWD_BROADCAST_INTERVAL
        value: "2.5"
      - key: INSTANCE_ID
        value: render-api-1
      - key: SCRAPERBOT_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # ── WhatsApp / Mana Mitra integration ────────────────────────────
      # All optional. Defaults to mock provider so the API never crashes
      # for a missing credential. Flip WHATSAPP_PROVIDER once real keys
      # are configured in the Render dashboard.
      - key: WHATSAPP_ENABLED
        value: "true"
      - key: WHATSAPP_PROVIDER
        value: "mock"
      - key: WHATSAPP_DEFAULT_COUNTRY_CODE
        value: "91"
      - key: WHATSAPP_PUBLIC_NUMBER
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: MANA_MITRA_API_URL
        sync: false
      - key: MANA_MITRA_API_KEY
        sync: false
      - key: MANA_MITRA_SENDER_ID
        value: "PUSHKARALU"
      - key: META_WA_TOKEN
        sync: false
      - key: META_WA_PHONE_NUMBER_ID
        sync: false
      - key: META_WA_VERIFY_TOKEN
        value: "pushkaralu-verify"
      - key: META_GRAPH_VERSION
        value: "v20.0"
      - key: ADMIN_API_KEY
        sync: false
    healthCheckPath: /ping
    autoDeploy: true

  - type: redis
    name: pushkaralu-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
