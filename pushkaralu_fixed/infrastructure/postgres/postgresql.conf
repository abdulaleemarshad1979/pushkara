# ── Godavari Pushkaralu 2027 — PostgreSQL Performance Config  (v5)
# Tuned for a 2-4 vCPU / 4-8 GB RAM server (adjust shared_buffers for your RAM).

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers             = 512MB       # 25% of total RAM
work_mem                   = 16MB        # per sort/hash — lower if many concurrent connections
maintenance_work_mem       = 128MB       # for VACUUM, CREATE INDEX
effective_cache_size       = 2GB         # total RAM minus OS needs (hint for planner)

# ── Connections ───────────────────────────────────────────────────────────────
max_connections            = 100         # db_writer pool = 10; leave headroom

# ── WAL ───────────────────────────────────────────────────────────────────────
wal_level                  = replica
wal_buffers                = 16MB
checkpoint_completion_target = 0.9
min_wal_size               = 80MB
max_wal_size               = 1GB

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum                 = on
autovacuum_vacuum_scale_factor  = 0.05
autovacuum_analyze_scale_factor = 0.02

# ── Logging ───────────────────────────────────────────────────────────────────
log_min_duration_statement = 500         # log queries > 500ms
log_line_prefix            = '%t [%p] %u@%d '
log_timezone               = 'Asia/Kolkata'

# ── Locale ────────────────────────────────────────────────────────────────────
timezone                   = 'Asia/Kolkata'
