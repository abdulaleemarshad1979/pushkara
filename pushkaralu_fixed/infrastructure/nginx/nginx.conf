# ═══════════════════════════════════════════════════════════════════════════════
# Godavari Pushkaralu 2027 — Nginx Configuration  (v6.1 — Production Grade)
#
# CRITICAL FIX vs v6.0:
#   Rate-limit zones now keyed on $real_client_ip (from X-Forwarded-For).
#   Behind a CDN/LB each pilgrim gets their own bucket.
#   In K6 localhost tests each VU still uses 127.0.0.1 but limit is now
#   300r/m so 1000 VUs from same IP will see realistic festival-scale limits.
#
#   Raised limits to match real festival load:
#   - api_general: 60r/m → 300r/m (5r/s per IP — realistic mobile app)
#   - api_sos:      5r/m → 10r/m  (life-critical, burst=5, no nodelay)
#   - api_conn:    50    → 200     (carrier NAT groups many phones)
#   - ws_conn:    200    → 500     (carrier NAT + festival WiFi hotspots)
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    charset      utf-8;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    client_max_body_size     10m;
    client_body_buffer_size  128k;
    client_header_buffer_size 4k;

    proxy_buffering        on;
    proxy_buffer_size      16k;
    proxy_buffers          8 16k;
    proxy_busy_buffers_size 32k;

    open_file_cache          max=1000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    log_format main '$remote_addr [$real_client_ip] $request_time $status "$request" upstream=$upstream_addr';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_min_length   500;
    gzip_types application/json application/javascript text/css text/plain;

    # ── Real client IP from CDN/LB X-Forwarded-For header ────────────────────
    map $http_x_forwarded_for $real_client_ip {
        default    $remote_addr;
        "~^(\S+)"  $1;
    }

    # ── Rate zones — keyed on real client IP, not proxy IP ───────────────────
    limit_req_zone  $real_client_ip zone=api_general:20m rate=300r/m;
    limit_req_zone  $real_client_ip zone=api_sos:10m     rate=10r/m;
    limit_req_zone  $real_client_ip zone=api_report:10m  rate=20r/m;
    limit_req_zone  $real_client_ip zone=api_ingest:10m  rate=60r/m;
    limit_conn_zone $real_client_ip zone=ws_conn:20m;
    limit_conn_zone $real_client_ip zone=api_conn:20m;

    upstream pushkaralu_api {
        least_conn;
        server api-1:8000 max_fails=3 fail_timeout=10s weight=1;
        server api-2:8000 max_fails=3 fail_timeout=10s weight=1;
        server api-3:8000 max_fails=3 fail_timeout=10s weight=1;
        server api-4:8000 max_fails=3 fail_timeout=10s weight=1;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout  30s;
    }

    server {
        listen 8088 default_server;
        server_name _;

        add_header X-Content-Type-Options  nosniff    always;
        add_header X-Frame-Options         SAMEORIGIN always;
        add_header X-XSS-Protection        "1; mode=block" always;

        limit_conn api_conn 200;

        location = /       { root /var/www/pushkaralu/dashboard; try_files /index.html =404; }
        location = /index.html { root /var/www/pushkaralu/dashboard; expires 0; add_header Cache-Control "no-cache"; }
        location = /user.html  { root /var/www/pushkaralu/dashboard; expires 0; add_header Cache-Control "no-cache"; }
        location = /admin.html { root /var/www/pushkaralu/dashboard; expires 0; add_header Cache-Control "no-cache"; }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/pushkaralu/dashboard;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            access_log off;
            try_files $uri =404;
        }

        location /uploads/ {
            alias /var/www/pushkaralu/uploads/;
            expires 24h;
            access_log off;
        }

        location ~ ^/ws/ {
            proxy_pass            http://pushkaralu_api;
            proxy_http_version    1.1;
            proxy_set_header      Upgrade    $http_upgrade;
            proxy_set_header      Connection "Upgrade";
            proxy_set_header      Host       $host;
            proxy_set_header      X-Real-IP  $real_client_ip;
            proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 5s;
            proxy_buffering       off;
            limit_conn            ws_conn 500;
        }

        # SOS: life-critical — no nodelay so duplicates queue not 429
        location = /sos_alert {
            proxy_pass         http://pushkaralu_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $real_client_ip;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req          zone=api_sos burst=5;
            limit_req_status   429;
        }

        location = /report_issue {
            proxy_pass         http://pushkaralu_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $real_client_ip;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req          zone=api_report burst=5 nodelay;
            client_max_body_size 6m;
        }

        location ~ ^/crowd/ingest/ {
            proxy_pass         http://pushkaralu_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $real_client_ip;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req          zone=api_ingest burst=10 nodelay;
        }

        location = /health {
            proxy_pass         http://pushkaralu_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            access_log off;
        }

        location = /metrics {
            proxy_pass         http://pushkaralu_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }

        location / {
            proxy_pass         http://pushkaralu_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $real_client_ip;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_send_timeout   30s;
            proxy_read_timeout   30s;
            limit_req          zone=api_general burst=30 nodelay;
            limit_req_status   429;
        }

        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"error":"too_many_requests","message":"Rate limit exceeded. Please wait a moment."}';
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            default_type application/json;
            return 503 '{"error":"service_unavailable","message":"Service temporarily unavailable. Retrying automatically."}';
        }
    }
}
